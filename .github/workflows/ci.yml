name: ci
on:
  push:
  pull_request:
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (blocking)
        run: shellcheck -x -s bash i7aket/skills/codex-check/scripts/run.sh
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: run bats
        run: bats test/
